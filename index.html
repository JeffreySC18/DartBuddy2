<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DartBuddy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0e0e0e;
      --surface: #161616;
      --border:  #242424;
      --text:    #e8e8e8;
      --muted:   #666;
      --accent:  #c8ff00;
      --danger:  #ff4444;
      --mono:    'DM Mono', monospace;
      --sans:    'DM Sans', sans-serif;
      --radius:  6px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      min-height: 100dvh;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-family: var(--mono);
      font-size: 13px;
      letter-spacing: 0.08em;
      color: var(--accent);
    }

    .status {
      display: flex;
      align-items: center;
      gap: 7px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }

    .status-dot.online { background: var(--accent); }
    .status-dot.error  { background: var(--danger); }

    main {
      display: grid;
      grid-template-columns: 1fr 280px;
      overflow: hidden;
    }

    @media (max-width: 700px) {
      main { grid-template-columns: 1fr; grid-template-rows: 1fr auto; }
    }

    #camera-panel {
      position: relative;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      min-height: 300px;
    }

    #video  { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; }
    #canvas { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; pointer-events: none; }

    .cam-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 12px;
    }

    .cam-placeholder svg { opacity: 0.3; }

    #inf-badge {
      position: absolute;
      bottom: 12px;
      left: 12px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      background: rgba(0,0,0,0.6);
      padding: 3px 8px;
      border-radius: var(--radius);
      display: none;
    }

    #score-panel {
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    @media (max-width: 700px) {
      #score-panel { border-left: none; border-top: 1px solid var(--border); }
    }

    .panel-section {
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }

    .panel-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .dart-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 6px 0;
    }

    .dart-row + .dart-row { border-top: 1px solid var(--border); }

    .dart-label {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
    }

    .dart-score {
      font-family: var(--mono);
      font-size: 18px;
      font-weight: 500;
      color: var(--text);
      transition: color 0.2s;
    }

    .dart-score.hit     { color: var(--accent); }
    .dart-score.miss    { color: var(--muted); }
    .dart-score.waiting { color: var(--muted); font-size: 13px; }

    .dart-pts {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      min-width: 32px;
      text-align: right;
    }

    #total-display {
      font-family: var(--mono);
      font-size: 48px;
      font-weight: 500;
      color: var(--accent);
      line-height: 1;
      margin-top: 4px;
    }

    .btn {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.06em;
      padding: 8px 14px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      width: 100%;
      text-align: left;
    }

    .btn:hover  { border-color: var(--text); color: var(--text); }
    .btn.active { border-color: var(--accent); color: var(--accent); }
    .btn + .btn { margin-top: 6px; }

    footer {
      padding: 10px 20px;
      border-top: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>
<body>

<header>
  <span class="logo">DARTBUDDY</span>
  <div class="status">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">connecting...</span>
  </div>
</header>

<main>
  <div id="camera-panel">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="canvas"></canvas>
    <div class="cam-placeholder" id="placeholder">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
      <span>start camera</span>
    </div>
    <div id="inf-badge">--ms</div>
  </div>

  <div id="score-panel">
    <div class="panel-section">
      <div class="panel-label">DARTS</div>
      <div id="dart-rows">
        <div class="dart-row"><span class="dart-label">01</span><span class="dart-score miss">—</span><span class="dart-pts"></span></div>
        <div class="dart-row"><span class="dart-label">02</span><span class="dart-score miss">—</span><span class="dart-pts"></span></div>
        <div class="dart-row"><span class="dart-label">03</span><span class="dart-score miss">—</span><span class="dart-pts"></span></div>
      </div>
    </div>

    <div class="panel-section">
      <div class="panel-label">TOTAL</div>
      <div id="total-display">0</div>
    </div>

    <div class="panel-section">
      <div class="panel-label">CAMERA</div>
      <button class="btn" id="btn-camera">start camera</button>
      <button class="btn" id="btn-facing">flip camera</button>
    </div>

    <div class="panel-section">
      <div class="panel-label">CONTROLS</div>
      <button class="btn" id="btn-debug">debug overlay</button>
      <button class="btn" id="btn-freeze">freeze</button>
      <button class="btn" id="btn-reset">reset scores</button>
    </div>
  </div>
</main>

<footer>
  <span>dartbuddy v0.1</span>
  <span id="fps-display">-- fps</span>
</footer>

<script>
  const API         = '';
  const INTERVAL_MS = 100;   // ~10 fps

  // ─── Tuning ──────────────────────────────────────────────────────────────────
  const BOARD_EMA_ALPHA     = 0.15;

  const BOARD_STABLE_FRAMES = 10;
  const BOARD_STABLE_PX     = 6;    // per-keypoint max drift to count as stable

  const BOARD_SHIFT_PX      = 40;

  // Darts – accumulate this many frames (~2 s at 10 fps) before voting.
  const DART_ACCUM_FRAMES   = 20;
  const DART_LOCK_THRESHOLD = 0.60;

  // End-of-round – frames of zero darts (after first lock) before reset.
  const ALL_ABSENT_FRAMES   = 25;   // ≈ 2.5 s

  // Pixel radius for matching a new dart detection to an existing slot.
  const TIP_MATCH_RADIUS    = 80;


  // ─── Board state ─────────────────────────────────────────────────────────────

  const boardState = {
    locked:       false,
    ema:          null,    // running average: [[x,y], [x,y], [x,y], [x,y]]
    stableFrames: 0,       // consecutive frames within BOARD_STABLE_PX
    keypoints:    null,    // frozen keypoints once locked
    bbox:         null,    // live bbox (always updated)
    conf:         0,
  };

  function resetBoardState() {
    boardState.locked       = false;
    boardState.ema          = null;
    boardState.stableFrames = 0;
    boardState.keypoints    = null;
    boardState.bbox         = null;
    boardState.conf         = 0;
  }

  function updateBoard(data) {
    const board = data.board;

    // Always keep live bbox for overlay.
    if (board?.detected) {
      boardState.bbox = board.bbox;
      boardState.conf = board.confidence;
    }

    // Once locked, nothing changes.
    if (boardState.locked) return;

    if (!board?.detected) return;   // board not visible

    const kps = board.keypoints || [];
    if (kps.filter(k => k !== null).length < 4) return;  // partial frame — skip

    if (!boardState.ema) {
      // First valid frame: seed the EMA.
      boardState.ema = kps.map(k => [k[0], k[1]]);
      boardState.stableFrames = 1;
      return;
    }


    const maxDrift = Math.max(...kps.map((k, i) => {
      const [ex, ey] = boardState.ema[i];
      return Math.hypot(k[0] - ex, k[1] - ey);
    }));

    if (maxDrift > BOARD_SHIFT_PX) {

      boardState.stableFrames = 0;
    } else {
      boardState.stableFrames++;
    }


    boardState.ema = boardState.ema.map((e, i) => [
      e[0] + BOARD_EMA_ALPHA * (kps[i][0] - e[0]),
      e[1] + BOARD_EMA_ALPHA * (kps[i][1] - e[1]),
    ]);

    if (boardState.stableFrames >= BOARD_STABLE_FRAMES) {
      boardState.keypoints = boardState.ema.map(e => [e[0], e[1]]);
      boardState.locked    = true;
      console.log('[board] locked after', boardState.stableFrames, 'stable frames:', boardState.keypoints);
    }
  }


  // ─── Dart slot ───────────────────────────────────────────────────────────────

  class DartSlot {
    constructor() { this.reset(); }

    reset() {
      this.state       = 'empty';
      this.buffer      = [];
      this.lockedScore = null;
      this.lockedValue = null;
      this.lastTip     = null;
    }

    update(detected, score, value) {
      if (this.state === 'locked') return;
      if (!detected) return;

      this.state = 'accumulating';
      this.buffer.push({ score, value });
      if (this.buffer.length > DART_ACCUM_FRAMES) this.buffer.shift();
      if (this.buffer.length < DART_ACCUM_FRAMES) return;

      const counts = {};
      this.buffer.forEach(s => { counts[s.score] = (counts[s.score] || 0) + 1; });
      const [topScore, topCount] = Object.entries(counts).sort((a, b) => b[1] - a[1])[0];

      if (topCount / this.buffer.length >= DART_LOCK_THRESHOLD) {
        this.state       = 'locked';
        this.lockedScore = topScore;
        this.lockedValue = this.buffer.find(s => s.score === topScore).value;
        console.log(`[dart] locked: ${topScore}`);
      }
    }

    get display() {
      if (this.state === 'locked')       return { score: this.lockedScore, value: this.lockedValue, state: 'locked' };
      if (this.state === 'accumulating') return { score: '...', value: null, state: 'accumulating' };
      return { score: '—', value: null, state: 'empty' };
    }
  }


  // ─── Round state ─────────────────────────────────────────────────────────────

  const slots = [new DartSlot(), new DartSlot(), new DartSlot()];
  let allAbsentCounter = 0;
  let dartEverLocked   = false;

  function resetRound() {
    slots.forEach(s => s.reset());
    allAbsentCounter = 0;
    dartEverLocked   = false;
    console.log('[round] reset');
  }


  // ─── Score update ────────────────────────────────────────────────────────────

  function updateScores(data) {
    const darts   = data.darts || [];
    const matched = [false, false, false];

    darts.forEach(dart => {
      let bestSlot = -1, bestDist = Infinity;
      slots.forEach((slot, i) => {
        if (matched[i] || slot.state === 'empty' || !slot.lastTip) return;
        const dist = Math.hypot(dart.tip[0] - slot.lastTip[0], dart.tip[1] - slot.lastTip[1]);
        if (dist < bestDist && dist < TIP_MATCH_RADIUS) { bestDist = dist; bestSlot = i; }
      });

      if (bestSlot >= 0) {
        slots[bestSlot].lastTip = dart.tip;
        slots[bestSlot].update(true, dart.score, dart.value);
        matched[bestSlot] = true;
      } else {
        const idx = slots.findIndex((s, i) => s.state === 'empty' && !matched[i]);
        if (idx >= 0) {
          slots[idx].lastTip = dart.tip;
          slots[idx].update(true, dart.score, dart.value);
          matched[idx] = true;
        }
      }
    });

    slots.forEach((slot, i) => { if (!matched[i]) slot.update(false, null, null); });

    if (slots.some(s => s.state === 'locked')) dartEverLocked = true;

    if (dartEverLocked && darts.length === 0) {
      allAbsentCounter++;
      if (allAbsentCounter >= ALL_ABSENT_FRAMES) {
        resetRound();
        renderScores();
        return;
      }
    } else if (darts.length > 0) {
      allAbsentCounter = 0;
    }

    renderScores();
  }

  function renderScores() {
    let total = 0;
    slots.forEach((slot, i) => {
      const scoreEl = dartRows[i].querySelector('.dart-score');
      const ptsEl   = dartRows[i].querySelector('.dart-pts');
      const d       = slot.display;
      if (d.state === 'locked') {
        scoreEl.textContent = d.score;
        scoreEl.className   = 'dart-score hit';
        ptsEl.textContent   = `${d.value}`;
        total += d.value;
      } else if (d.state === 'accumulating') {
        scoreEl.textContent = '...';
        scoreEl.className   = 'dart-score waiting';
        ptsEl.textContent   = '';
      } else {
        scoreEl.textContent = '—';
        scoreEl.className   = 'dart-score miss';
        ptsEl.textContent   = '';
      }
    });
    totalEl.textContent = total;
  }


  // ─── Canvas overlay ──────────────────────────────────────────────────────────

  function drawOverlay(data) {
    if (!video.videoWidth) return;
    canvas.width  = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Use locked keypoints once available; EMA while acquiring; live otherwise.
    const bboxToDraw = boardState.bbox || data.board?.bbox;
    const kpsToDraw  = boardState.locked
      ? boardState.keypoints
      : (boardState.ema || data.board?.keypoints || []);

    // Colour codes:
    //   locked  → full accent green
    //   EMA/acquiring → dim yellow-green
    //   no EMA yet → dark muted
    const boardColor = boardState.locked ? '#c8ff00'
                     : boardState.ema    ? '#7a9900'
                                         : '#444400';

    if (bboxToDraw) {
      const [x1, y1, x2, y2] = bboxToDraw;
      ctx.strokeStyle = boardColor;
      ctx.lineWidth   = 1.5;
      ctx.strokeRect(x1, y1, x2 - x1, y2 - y1);

      if (debugMode) {
        ctx.font      = '11px DM Mono, monospace';
        ctx.fillStyle = boardColor;
        ctx.textAlign = 'left';
        const label = boardState.locked
          ? `board locked  ${Math.round((boardState.conf || 0) * 100)}%`
          : `acquiring… ${boardState.stableFrames}/${BOARD_STABLE_FRAMES}`;
        ctx.fillText(label, x1, y1 - 6);
      }
    }

    const kpLabels = ['T', 'R', 'B', 'L'];
    (kpsToDraw || []).forEach((kp, i) => {
      if (!kp) return;
      ctx.beginPath();
      ctx.arc(kp[0], kp[1], debugMode ? 8 : 4, 0, Math.PI * 2);
      ctx.fillStyle = boardColor;
      ctx.fill();

      if (debugMode) {
        ctx.font      = 'bold 14px DM Mono, monospace';
        ctx.fillStyle = '#000';
        ctx.textAlign = 'center';
        ctx.fillText(kpLabels[i], kp[0], kp[1] + 5);
        ctx.font      = '11px DM Mono, monospace';
        ctx.fillStyle = boardColor;
        ctx.textAlign = 'left';
        ctx.fillText(`${Math.round(kp[0])},${Math.round(kp[1])}`, kp[0] + 12, kp[1] - 8);
      }
    });

    if (debugMode && (kpsToDraw || []).filter(k => k).length === 4) {
      const valid = kpsToDraw.filter(k => k);
      ctx.strokeStyle = boardColor.replace(')', ', 0.35)').replace('rgb', 'rgba');
      ctx.lineWidth   = 1;
      ctx.setLineDash([4, 4]);
      ctx.beginPath();
      ctx.moveTo(valid[0][0], valid[0][1]);
      valid.forEach(kp => ctx.lineTo(kp[0], kp[1]));
      ctx.closePath();
      ctx.stroke();
      ctx.setLineDash([]);
    }

    // Darts
    (data.darts || []).forEach(d => {
      const [x1, y1, x2, y2] = d.bbox;
      ctx.strokeStyle = d.value > 0 ? '#ffffff' : '#666666';
      ctx.lineWidth   = 1;
      ctx.strokeRect(x1, y1, x2 - x1, y2 - y1);

      ctx.beginPath();
      ctx.arc(d.tip[0], d.tip[1], debugMode ? 6 : 4, 0, Math.PI * 2);
      ctx.fillStyle = d.value > 0 ? '#ffffff' : '#666666';
      ctx.fill();

      ctx.font      = `${debugMode ? '13px' : '12px'} DM Mono, monospace`;
      ctx.fillStyle = d.value > 0 ? '#c8ff00' : '#666666';
      ctx.textAlign = 'center';
      ctx.fillText(d.score, d.tip[0], d.tip[1] - 12);

      if (debugMode) {
        ctx.font      = '10px DM Mono, monospace';
        ctx.fillStyle = '#aaaaaa';
        ctx.fillText(`${Math.round(d.confidence * 100)}%`, d.tip[0], d.tip[1] + 18);
      }
    });
  }


  // ─── App plumbing ────────────────────────────────────────────────────────────

  let stream     = null;
  let intervalId = null;
  let frozen     = false;
  let debugMode  = false;
  let facingMode = 'environment';
  let frameCount = 0;
  let fpsTimer   = Date.now();

  const video       = document.getElementById('video');
  const canvas      = document.getElementById('canvas');
  const ctx         = canvas.getContext('2d');
  const placeholder = document.getElementById('placeholder');
  const infBadge    = document.getElementById('inf-badge');
  const statusDot   = document.getElementById('status-dot');
  const statusText  = document.getElementById('status-text');
  const totalEl     = document.getElementById('total-display');
  const fpsEl       = document.getElementById('fps-display');
  const dartRows    = document.querySelectorAll('#dart-rows .dart-row');

  async function checkHealth() {
    try {
      const res  = await fetch(`${API}/health`);
      const data = await res.json();
      setStatus(data.model_loaded ? 'online' : 'error',
                data.model_loaded ? 'model ready' : 'model not loaded');
    } catch { setStatus('error', 'server offline'); }
  }

  function setStatus(state, text) {
    statusDot.className    = `status-dot ${state}`;
    statusText.textContent = text;
  }

  async function startCamera() {
    if (stream) stopCamera();
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode, width: { ideal: 1280 }, height: { ideal: 720 } }
      });
      video.srcObject = stream;
      placeholder.style.display = 'none';
      infBadge.style.display    = 'block';
      document.getElementById('btn-camera').textContent = 'stop camera';
      document.getElementById('btn-camera').classList.add('active');
      startDetection();
    } catch { setStatus('error', 'camera denied'); }
  }

  function stopCamera() {
    stream?.getTracks().forEach(t => t.stop());
    stream = null;
    stopDetection();
    placeholder.style.display = 'flex';
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    infBadge.style.display = 'none';
    document.getElementById('btn-camera').textContent = 'start camera';
    document.getElementById('btn-camera').classList.remove('active');
    resetRound();
    resetBoardState();
  }

  function startDetection() { stopDetection(); intervalId = setInterval(sendFrame, INTERVAL_MS); }
  function stopDetection()  { clearInterval(intervalId); intervalId = null; }

  async function sendFrame() {
    if (frozen || !stream || video.readyState < 2) return;
    const off = document.createElement('canvas');
    off.width  = video.videoWidth;
    off.height = video.videoHeight;
    off.getContext('2d').drawImage(video, 0, 0);
    off.toBlob(async blob => {
      if (!blob) return;
      const form = new FormData();
      form.append('file', blob, 'frame.jpg');
      try {
        const res  = await fetch(`${API}/detect`, { method: 'POST', body: form });
        const data = await res.json();
        updateBoard(data);
        updateScores(data);
        drawOverlay(data);
        infBadge.textContent = `${data.inference_ms}ms`;
        frameCount++;
        const now = Date.now();
        if (now - fpsTimer >= 1000) {
          fpsEl.textContent = `${frameCount} fps`;
          frameCount = 0;
          fpsTimer   = now;
        }
      } catch { setStatus('error', 'request failed'); }
    }, 'image/jpeg', 0.8);
  }

  document.getElementById('btn-camera').addEventListener('click', () => stream ? stopCamera() : startCamera());
  document.getElementById('btn-facing').addEventListener('click', () => {
    facingMode = facingMode === 'environment' ? 'user' : 'environment';
    if (stream) startCamera();
  });
  document.getElementById('btn-debug').addEventListener('click', function() {
    debugMode = !debugMode;
    this.classList.toggle('active', debugMode);
    this.textContent = debugMode ? 'hide debug' : 'debug overlay';
  });
  document.getElementById('btn-freeze').addEventListener('click', function() {
    frozen = !frozen;
    this.classList.toggle('active', frozen);
    this.textContent = frozen ? 'unfreeze' : 'freeze';
  });
  document.getElementById('btn-reset').addEventListener('click', () => {
    resetRound();
    resetBoardState();
    renderScores();
  });

  checkHealth();
  setInterval(checkHealth, 10000);
</script>
</body>
</html>
